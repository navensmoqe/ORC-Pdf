<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Web App</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OCR App">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #e0e4e8;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --primary: #4A90D9;
  --primary-light: #e8f0fe;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  background: var(--card);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 600; }
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 18px;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { background: var(--bg); color: var(--text); }
.main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: var(--card);
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 24px;
}
.upload-zone:hover,
.upload-zone.dragover { border-color: var(--primary); background: var(--primary-light); }
.upload-icon {
  width: 56px; height: 56px;
  background: var(--primary-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  color: var(--primary);
  font-size: 24px;
}
.upload-zone h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.upload-zone p { color: var(--text-secondary); font-size: 14px; }
.upload-zone p a { color: var(--primary); text-decoration: underline; cursor: pointer; }
#fileInput { display: none; }

.processing-section {
  display: none;
  margin-bottom: 24px;
  text-align: center;
}
.processing-section.active { display: block; }
.processing-label { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; }
.progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%; background: var(--primary); border-radius: 3px;
  width: 0%; transition: width 0.3s;
  animation: indeterminate 1.5s infinite;
}
@keyframes indeterminate {
  0% { width: 0%; margin-left: 0; }
  50% { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}
.progress-fill.done { animation: none; width: 100%; }

.results-section { display: none; margin-bottom: 24px; }
.results-section.active { display: block; }
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

.preview-panel {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.preview-container {
  padding: 16px;
  min-height: 400px;
  max-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  background: #fafafa;
}
.preview-container img,
.preview-container canvas {
  max-width: 100%;
  height: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.preview-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.preview-controls .icon-btn { font-size: 14px; width: 32px; height: 32px; }
.page-num {
  font-size: 13px; font-weight: 500;
  min-width: 36px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
}

.editor-panel {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.toolbar .icon-btn { font-size: 14px; width: 32px; height: 32px; }
.toolbar .text-btn { font-weight: 700; font-size: 14px; font-family: 'Inter', serif; }
.toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.editor-content {
  padding: 20px;
  min-height: 400px;
  max-height: 600px;
  outline: none;
  font-size: 14px;
  line-height: 1.7;
  overflow-y: auto;
}
.editor-content h1, .editor-content h2, .editor-content h3 { margin: 16px 0 8px; }
.editor-content p { margin-bottom: 12px; }
.editor-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.editor-content td, .editor-content th { border: 1px solid var(--border); padding: 8px; font-size: 13px; }

.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  width: 90%; max-width: 440px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.modal label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.modal input {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--primary); }
.modal-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
.btn {
  padding: 10px 20px; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; border: none;
  font-family: inherit; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: var(--bg); color: var(--text); }
.btn-ghost:hover { background: var(--border); }

.recent-scans { margin-top: 24px; }
.recent-scans h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.scan-list { display: flex; flex-direction: column; gap: 8px; }
.scan-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--card);
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.scan-item:hover { box-shadow: var(--shadow); }
.scan-icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.scan-info { flex: 1; min-width: 0; }
.scan-info .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scan-info .date { font-size: 12px; color: var(--text-secondary); }
.scan-item .chevron { color: var(--text-secondary); font-size: 12px; }

.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 2000; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 20px; border-radius: 8px;
  font-size: 14px; color: white;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: slideIn 0.3s ease;
}
.toast.error { background: #e74c3c; }
.toast.success { background: #27ae60; }
.toast.info { background: var(--primary); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.mobile-actions {
  display: none;
  justify-content: center;
  gap: 20px;
  margin: 32px auto;
}
.mobile-scan-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--bg); border: 3px solid var(--border);
  color: var(--text-secondary); font-size: 28px;
  cursor: pointer;
  align-items: center; justify-content: center;
  transition: all 0.2s;
  display: flex;
}
.mobile-scan-btn:hover { border-color: var(--primary); color: var(--primary); }

@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 16px; }
  .main { padding: 16px; }
  .upload-section { display: none; }
  .mobile-actions { display: flex; }
  .results-grid { grid-template-columns: 1fr; }
  .preview-container { min-height: 250px; }
  .editor-content { min-height: 300px; max-height: 400px; }
}
</style>
</head>
<body>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label for="apiKeyInput">Mistral API Key</label>
    <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key...">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveApiKey()">Save</button>
    </div>
  </div>
</div>

<div class="header">
  <h1>OCR Web App</h1>
  <button class="icon-btn" onclick="showSettings()" title="Settings">
    <i class="fa-solid fa-gear"></i>
  </button>
</div>

<div class="main">
  <div class="upload-section" id="uploadSection">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
      <h2>Upload & Drag</h2>
      <p>Drag your file here, or <a>browse</a></p>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp,.tiff">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  </div>

  <div class="mobile-actions">
    <button class="mobile-scan-btn" id="mobileScanBtn" title="التقاط صورة">
      <i class="fa-solid fa-camera"></i>
    </button>
    <button class="mobile-scan-btn" id="mobileUploadBtn" title="رفع ملف PDF أو صورة">
      <i class="fa-solid fa-file-arrow-up"></i>
    </button>
  </div>

  <div class="processing-section" id="processingSection">
    <div class="processing-label">Processing</div>
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-grid">
      <div class="preview-panel">
        <div class="preview-container" id="previewContainer"></div>
        <div class="preview-controls">
          <button class="icon-btn" onclick="zoomPreview()" title="Zoom"><i class="fa-solid fa-magnifying-glass"></i></button>
          <button class="icon-btn" onclick="prevPage()" title="Previous"><i class="fa-solid fa-minus"></i></button>
          <span class="page-num" id="pageNum">1</span>
          <button class="icon-btn" onclick="nextPage()" title="Next"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="editor-panel">
        <div class="toolbar">
          <button class="icon-btn text-btn" onclick="execCmd('bold')" title="Bold"><b>B</b></button>
          <button class="icon-btn text-btn" onclick="execCmd('italic')" title="Italic"><i>I</i></button>
          <button class="icon-btn text-btn" onclick="execCmd('underline')" title="Underline"><u>U</u></button>
          <div class="sep"></div>
          <button class="icon-btn" onclick="addLink()" title="Link"><i class="fa-solid fa-link"></i></button>
          <button class="icon-btn" onclick="execCmd('unlink')" title="Unlink"><i class="fa-solid fa-link-slash"></i></button>
          <div class="sep"></div>
          <button class="icon-btn" onclick="execCmd('insertOrderedList')" title="Ordered List"><i class="fa-solid fa-list-ol"></i></button>
          <button class="icon-btn" onclick="execCmd('insertUnorderedList')" title="Unordered List"><i class="fa-solid fa-list-ul"></i></button>
          <div class="sep"></div>
          <button class="icon-btn" onclick="downloadText()" title="Download"><i class="fa-solid fa-download"></i></button>
          <button class="icon-btn" onclick="printText()" title="Print"><i class="fa-solid fa-print"></i></button>
        </div>
        <div class="editor-content" id="editorContent" contenteditable="true"></div>
      </div>
    </div>
  </div>

  <div class="recent-scans" id="recentScansSection">
    <h3>Recent Scans</h3>
    <div class="scan-list" id="scanList"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const state = {
  apiKey: localStorage.getItem('mistral_api_key') || '',
  currentFile: null,
  pdfDoc: null,
  currentPage: 1,
  totalPages: 1,
  scale: 1,
  recentScans: JSON.parse(localStorage.getItem('recent_scans') || '[]')
};

function showSettings() {
  document.getElementById('apiKeyInput').value = state.apiKey;
  document.getElementById('settingsModal').classList.add('active');
}

function hideSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return showToast('Please enter a valid API key', 'error');
  state.apiKey = key;
  localStorage.setItem('mistral_api_key', key);
  hideSettings();
  showToast('API key saved', 'success');
}

function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

var uploadZone = document.getElementById('uploadZone');
var fileInput = document.getElementById('fileInput');
var cameraInput = document.getElementById('cameraInput');

uploadZone.addEventListener('click', function() { fileInput.click(); });
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', function() { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) { if (e.target.files.length) handleFile(e.target.files[0]); });
cameraInput.addEventListener('change', function(e) { if (e.target.files.length) handleFile(e.target.files[0]); });
document.getElementById('mobileScanBtn').addEventListener('click', function() { cameraInput.click(); });
document.getElementById('mobileUploadBtn').addEventListener('click', function() { fileInput.click(); });

function handleFile(file) {
  var valid = ['application/pdf','image/png','image/jpeg','image/webp','image/bmp','image/tiff'];
  if (!valid.includes(file.type)) return showToast('Unsupported file. Use PDF, PNG, JPG, WEBP, BMP, or TIFF.', 'error');
  if (file.size > 50 * 1024 * 1024) return showToast('File too large (max 50MB).', 'error');
  if (!state.apiKey) { showToast('Please set your API key first', 'error'); return showSettings(); }
  state.currentFile = file;
  fileInput.value = '';
  processOCR(file);
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function processOCR(file) {
  var proc = document.getElementById('processingSection');
  var res = document.getElementById('resultsSection');
  var bar = document.getElementById('progressBar');

  proc.classList.add('active');
  res.classList.remove('active');
  bar.className = 'progress-fill';
  bar.style.width = '';

  try {
    var base64 = await fileToBase64(file);
    var isPdf = file.type === 'application/pdf';
    var doc = isPdf
      ? { type: 'document_url', document_url: base64 }
      : { type: 'image_url', image_url: base64 };

    var response = await fetch('https://api.mistral.ai/v1/ocr', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + state.apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'mistral-ocr-latest',
        document: doc,
        include_image_base64: true
      })
    });

    if (!response.ok) {
      var err = await response.json().catch(function() { return {}; });
      throw new Error(err.message || err.detail || ('API error: ' + response.status));
    }

    var data = await response.json();
    bar.className = 'progress-fill done';

    await renderPreview(file);
    showResults(data);
    saveToRecent(file.name, data);
    showToast('OCR completed successfully', 'success');
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    setTimeout(function() { proc.classList.remove('active'); }, 1200);
  }
}

async function renderPreview(file) {
  var container = document.getElementById('previewContainer');
  container.innerHTML = '';
  state.currentPage = 1;
  state.scale = 1;

  if (file.type === 'application/pdf') {
    var buf = await file.arrayBuffer();
    state.pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
    state.totalPages = state.pdfDoc.numPages;
    await renderPdfPage(state.currentPage);
  } else {
    state.pdfDoc = null;
    state.totalPages = 1;
    var img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    img.alt = file.name;
    container.appendChild(img);
  }
  updatePageControls();
}

async function renderPdfPage(num) {
  var container = document.getElementById('previewContainer');
  container.innerHTML = '';
  var page = await state.pdfDoc.getPage(num);
  var vp = page.getViewport({ scale: state.scale * 1.5 });
  var canvas = document.createElement('canvas');
  canvas.width = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  container.appendChild(canvas);
}

function updatePageControls() {
  document.getElementById('pageNum').textContent = state.currentPage + ' / ' + state.totalPages;
}

function prevPage() {
  if (!state.pdfDoc || state.currentPage <= 1) return;
  state.currentPage--;
  renderPdfPage(state.currentPage);
  updatePageControls();
}

function nextPage() {
  if (!state.pdfDoc || state.currentPage >= state.totalPages) return;
  state.currentPage++;
  renderPdfPage(state.currentPage);
  updatePageControls();
}

function zoomPreview() {
  state.scale = state.scale >= 2 ? 0.75 : state.scale + 0.25;
  if (state.pdfDoc) {
    renderPdfPage(state.currentPage);
  } else {
    var img = document.querySelector('#previewContainer img');
    if (img) img.style.transform = 'scale(' + state.scale + ')';
  }
}

function showResults(data) {
  var editor = document.getElementById('editorContent');
  var section = document.getElementById('resultsSection');
  var md = '';
  if (data.pages && data.pages.length > 0) {
    md = data.pages.map(function(p) { return p.markdown; }).join('\n\n---\n\n');
  }
  editor.innerHTML = marked.parse(md);
  section.classList.add('active');
}

function execCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('editorContent').focus();
}

function addLink() {
  var url = prompt('Enter URL:');
  if (url) execCmd('createLink', url);
}

function downloadText() {
  var text = document.getElementById('editorContent').innerText;
  var name = (state.currentFile ? state.currentFile.name.replace(/\.[^.]+$/, '') : 'ocr-result') + '.txt';
  var blob = new Blob([text], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function printText() {
  var content = document.getElementById('editorContent').innerHTML;
  var w = window.open('', '_blank');
  w.document.write('<html><head><title>Print<\/title><style>body{font-family:Inter,sans-serif;padding:40px;line-height:1.7;color:#1a1a2e}table{border-collapse:collapse;width:100%}td,th{border:1px solid #e0e4e8;padding:8px}<\/style><\/head><body>' + content + '<\/body><\/html>');
  w.document.close();
  w.print();
}

function saveToRecent(name, data) {
  var preview = (data.pages && data.pages[0]) ? data.pages[0].markdown.substring(0, 100) : '';
  var scan = { name: name, date: new Date().toLocaleDateString(), preview: preview, pages: data.pages ? data.pages.length : 0 };
  state.recentScans.unshift(scan);
  if (state.recentScans.length > 10) state.recentScans.pop();
  localStorage.setItem('recent_scans', JSON.stringify(state.recentScans));
  renderRecentScans();
}

function renderRecentScans() {
  var list = document.getElementById('scanList');
  if (!state.recentScans.length) {
    list.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;padding:8px 0;">No recent scans<\/p>';
    return;
  }
  list.innerHTML = state.recentScans.map(function(s) {
    return '<div class="scan-item" title="' + (s.preview || '').replace(/"/g, '"') + '">' +
      '<div class="scan-icon"><i class="fa-solid fa-file-lines"><\/i><\/div>' +
      '<div class="scan-info">' +
        '<div class="name">' + s.name + '<\/div>' +
        '<div class="date">' + s.date + ' · ' + s.pages + ' page(s)<\/div>' +
      '<\/div>' +
      '<i class="fa-solid fa-chevron-right chevron"><\/i>' +
    '<\/div>';
  }).join('');
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) hideSettings();
});

renderRecentScans();
if (!state.apiKey) {
  setTimeout(function() {
    showSettings();
    showToast('Please enter your Mistral API key to get started', 'info');

}

if ('serviceWorker' in navigator) {

}
